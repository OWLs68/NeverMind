name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject deploy timestamp
        run: |
          VERSION=$(grep 'id="deploy-version"' index.html | grep -oP 'v\d+' | head -1)
          DEPLOY_TIME=$(TZ='Europe/Amsterdam' date '+%d.%m %H:%M')
          CACHE_TAG=$(TZ='Europe/Amsterdam' date '+%Y%m%d-%H%M')
          # Оновлюємо мітку версії в Inbox
          sed -i "s|>v[0-9]* · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]<|>${VERSION} · ${DEPLOY_TIME}<|" index.html
          # Оновлюємо ім'я кешу в SW — щоб браузер скинув старий кеш
          sed -i "s|const CACHE_NAME = 'nm-[^']*'|const CACHE_NAME = 'nm-${CACHE_TAG}'|" sw.js
          echo "Injected: ${VERSION} · ${DEPLOY_TIME} | cache: nm-${CACHE_TAG}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
