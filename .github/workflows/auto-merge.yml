name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

concurrency:
  group: auto-merge
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into main and inject deploy timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Переходимо на main і мержимо feature-гілку
          # -X theirs: при конфліктах (напр. sw.js CACHE_NAME) — feature-гілка виграє
          git checkout main
          git merge --no-edit -X theirs ${{ github.ref_name }}

          # Інжектуємо Amsterdam timestamp тільки в badge index.html
          # sw.js CACHE_NAME не чіпаємо — Claude оновлює його локально перед кожним пушем
          VERSION=$(grep 'id="deploy-version"' index.html | grep -oP 'v\d+' | head -1)
          DEPLOY_TIME=$(TZ='Europe/Amsterdam' date '+%d.%m %H:%M')
          sed -i "s|>v[0-9]* · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]<|>${VERSION} · ${DEPLOY_TIME}<|" index.html

          git add index.html
          git diff --staged --quiet || git commit -m "chore: deploy ${VERSION} · ${DEPLOY_TIME}"

          git push origin main
          echo "Deployed: ${VERSION} · ${DEPLOY_TIME}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
