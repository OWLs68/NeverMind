name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

concurrency:
  group: auto-merge
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      merged: ${{ steps.push.outputs.merged }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into main and inject deploy timestamp
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git merge --no-edit -X theirs ${{ github.ref_name }}

          VERSION=$(grep 'id="deploy-version"' index.html | grep -oP 'v\d+' | head -1)
          DEPLOY_TIME=$(TZ='Europe/Amsterdam' date '+%d.%m %H:%M')
          sed -i "s|>v[0-9]* · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]<|>${VERSION} · ${DEPLOY_TIME}<|" index.html

          git add index.html
          git diff --staged --quiet || git commit -m "chore: deploy ${VERSION} · ${DEPLOY_TIME}"

          git push origin main
          echo "merged=true" >> $GITHUB_OUTPUT
          echo "Deployed: ${VERSION} · ${DEPLOY_TIME}"

  deploy:
    needs: merge
    if: needs.merge.outputs.merged == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
