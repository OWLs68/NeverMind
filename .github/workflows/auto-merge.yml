name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

concurrency:
  group: auto-merge
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge into main and inject deploy timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          # Версія у main ДО merge (актуальна)
          MAIN_VERSION=$(grep 'id="deploy-version"' index.html | grep -oP 'v\K\d+' | head -1)

          git merge --no-edit -X theirs ${{ github.ref_name }}

          # Версія після merge (може бути старіша через -X theirs якщо claude гілка
          # містила старий текст бейджа — це нормально, беремо MAX з двох)
          BRANCH_VERSION=$(grep 'id="deploy-version"' index.html | grep -oP 'v\K\d+' | head -1)
          if [ "$MAIN_VERSION" -gt "$BRANCH_VERSION" ]; then
            OLD_VERSION=$MAIN_VERSION
          else
            OLD_VERSION=$BRANCH_VERSION
          fi
          NEW_VERSION=$((OLD_VERSION + 1))
          VERSION="v${NEW_VERSION}"
          DEPLOY_TIME=$(TZ='Europe/Amsterdam' date '+%d.%m %H:%M')
          sed -i "s|>v[0-9]* · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]<|>${VERSION} · ${DEPLOY_TIME}<|" index.html

          # Записуємо інформацію про деплой у data-* атрибути бейджа
          # (для модалки Deploy Info у застосунку)
          SHORT_SHA=$(git rev-parse --short HEAD)
          SOURCE_BRANCH="${{ github.ref_name }}"
          sed -i "s|data-commit=\"[^\"]*\"|data-commit=\"${SHORT_SHA}\"|" index.html
          sed -i "s|data-source=\"[^\"]*\"|data-source=\"${SOURCE_BRANCH}\"|" index.html
          sed -i "s|data-branch=\"[^\"]*\"|data-branch=\"main\"|" index.html

          git add index.html
          git diff --staged --quiet || git commit -m "chore: deploy ${VERSION} · ${DEPLOY_TIME}"

      - name: Build bundle
        run: |
          npm ci
          node build.js

      - name: Commit bundle and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bundle.js -f
          git diff --staged --quiet || git commit -m "build: generate bundle.js"
          git push origin main
          echo "Deployed"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
