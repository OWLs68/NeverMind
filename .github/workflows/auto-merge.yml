name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into main and inject deploy timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Переходимо на main і мержимо feature-гілку
          # Використовуємо звичайний merge (не --ff-only) щоб працювало навіть якщо гілки розійшлись
          git checkout main
          git merge --no-edit ${{ github.ref_name }}

          # Інжектуємо Amsterdam timestamp в badge і CACHE_NAME
          VERSION=$(grep 'id="deploy-version"' index.html | grep -oP 'v\d+' | head -1)
          DEPLOY_TIME=$(TZ='Europe/Amsterdam' date '+%d.%m %H:%M')
          CACHE_TAG=$(TZ='Europe/Amsterdam' date '+%Y%m%d-%H%M')
          sed -i "s|>v[0-9]* · [0-9][0-9]\.[0-9][0-9] [0-9][0-9]:[0-9][0-9]<|>${VERSION} · ${DEPLOY_TIME}<|" index.html
          sed -i "s|const CACHE_NAME = 'nm-[^']*'|const CACHE_NAME = 'nm-${CACHE_TAG}'|" sw.js

          git add index.html sw.js
          git diff --staged --quiet || git commit -m "chore: deploy ${VERSION} · ${DEPLOY_TIME}"

          git push origin main
          echo "Deployed: ${VERSION} · ${DEPLOY_TIME} | cache: nm-${CACHE_TAG}"
